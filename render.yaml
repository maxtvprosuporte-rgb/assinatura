services:
  # Backend API
  - type: web
    name: maxtvpro-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: maxtvpro
      - key: CORS_ORIGINS
        value: "*"
